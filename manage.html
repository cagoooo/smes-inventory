<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a84ff">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<title>石門盤點 · 管理後台</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- 登入畫面 -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">📊</div>
    <h1>盤點管理後台</h1>
    <p class="login-subtitle">需登入後才能查看全校資料</p>
    <button class="google-signin-btn" onclick="SMES_AUTH.signIn()">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.2 2.4-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C41.4 35.2 44 30 44 24c0-1.3-.1-2.6-.4-3.9z"/>
      </svg>
      用 Google 登入
    </button>
    <p class="login-note">
      🔒 限定 <b>@mail2.smes.tyc.edu.tw</b>
    </p>
  </div>
</div>

<div id="appShell" style="display:none;">

<div class="topbar">
  <span class="logo">📊</span>
  <div class="title">管理後台
    <div class="subtitle">統計 / 匯入 / 交叉比對</div>
  </div>
  <button class="nav-btn" onclick="location.href='index.html'">📷</button>
  <div id="userChip" class="user-chip" style="display:none;"></div>
</div>

<main>

  <!-- 總覽統計 -->
  <div class="stat-grid">
    <div class="stat-card"><div class="label">教室總數</div><div class="val" id="statRooms">-</div></div>
    <div class="stat-card accent"><div class="label">財產項目</div><div class="val" id="statInv">-</div></div>
    <div class="stat-card success"><div class="label">拍照紀錄</div><div class="val" id="statPhotos">-</div></div>
    <div class="stat-card danger"><div class="label">已比對</div><div class="val" id="statMatched">-</div></div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar" id="tabBar">
    <button class="active" data-tab="photos">📷 拍照</button>
    <button data-tab="rooms">🏫 教室</button>
    <button data-tab="inv">📦 財產</button>
    <button data-tab="import">📥 匯入</button>
  </div>

  <!-- Tab: 拍照紀錄 -->
  <div class="tab-content" id="tab-photos">
    <div class="search-wrap" style="margin-bottom:8px;">
      <input id="photoSearch" type="text" placeholder="搜尋教室 / 型號 / 財產編號">
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <select id="photoRoomFilter" style="flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-size:14px;">
        <option value="">所有教室</option>
      </select>
      <button class="btn btn-ghost-accent" onclick="exportPhotosExcel()" style="padding:10px 14px;">⬇️ 匯出</button>
    </div>
    <div id="photoList"></div>
  </div>

  <!-- Tab: 教室 -->
  <div class="tab-content" id="tab-rooms" style="display:none;">
    <div id="roomsList"></div>
  </div>

  <!-- Tab: 財產清冊 -->
  <div class="tab-content" id="tab-inv" style="display:none;">
    <div class="search-wrap" style="margin-bottom:8px;">
      <input id="invSearch" type="text" placeholder="搜尋編號 / 品名 / 型號">
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <select id="invRoomFilter" style="flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-size:14px;">
        <option value="">所有教室</option>
      </select>
      <select id="invYearFilter" style="padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-size:14px;">
        <option value="">所有年份</option>
      </select>
    </div>
    <div id="invList"></div>
  </div>

  <!-- Tab: 匯入 -->
  <div class="tab-content" id="tab-import" style="display:none;">
    <div class="card">
      <h2>📥 從 Excel 匯入財產清冊</h2>
      <p style="font-size:13px;color:var(--text-soft);line-height:1.5;margin:6px 0 14px;">
        上傳校內財產統計表 Excel，系統會自動對應欄位（財產編號、品名、型號、年份、位置等），預覽後確認匯入。
      </p>

      <label class="drop-area" for="excelFile">
        <div class="icon">📂</div>
        <div><b>選擇 Excel 檔</b></div>
        <div class="hint">支援 .xlsx / .xls / .csv</div>
      </label>
      <input id="excelFile" type="file" accept=".xlsx,.xls,.csv" style="display:none;">
    </div>

    <div id="excelPreview" style="display:none;">
      <div class="card">
        <h3>✅ 欄位對應（綠色=自動對應成功）</h3>
        <div id="sheetPicker"></div>
        <div id="fieldMap" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;"></div>
      </div>

      <div class="card">
        <h3>📋 資料預覽（前 10 筆）</h3>
        <div class="table-wrap">
          <table class="data-table" id="previewTable"></table>
        </div>
        <p id="previewStats" style="font-size:12px;color:var(--text-soft);margin-top:8px;"></p>
      </div>

      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-success" style="flex:1;min-width:140px;" onclick="confirmImport()">✅ 確認匯入</button>
        <button class="btn btn-danger" style="flex:1;min-width:140px;" onclick="clearAndImport()">🗑 清空再匯入</button>
        <button class="btn btn-ghost" onclick="cancelImport()">取消</button>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

</div><!-- /appShell -->

<script src="config.js"></script>
<script src="js/auth.js"></script>
<script src="js/supabase-client.js"></script>
<script>
  SMES_AUTH.initClient();
  SMES_AUTH.initSession();
  SMES_AUTH.onReady(user => {
    if (user) {
      // 登入後才載 manage.js
      const s = document.createElement('script');
      s.src = 'js/manage.js';
      document.body.appendChild(s);
    }
  });
</script>
</body>
</html>
